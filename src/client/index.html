<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/static/manifest.json">
  <title>WindowControl</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Rotate prompt (portrait mode) -->
  <div id="rotate-prompt">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <path d="M12 18h.01"/>
      <animateTransform attributeName="transform" type="rotate"
        values="0 12 12; -90 12 12; -90 12 12; 0 12 12" dur="2.5s" repeatCount="indefinite"/>
    </svg>
    <span>Rotate to landscape for best experience</span>
  </div>

  <!-- CENTER: stream -->
  <div id="stream-container">
    <img id="stream-img" alt="stream" draggable="false">
  </div>

  <!-- LEFT PANEL: toggle button + window list -->
  <div id="left-toggle" title="Windows"><span id="left-toggle-icon">&#9654;</span><span style="font-size:9px;opacity:0.7;writing-mode:vertical-rl">WINDOWS</span></div>

  <div id="left-panel">
    <div id="left-header">
      <span>Windows</span>
      <button id="left-close">&#10005;</button>
    </div>
    <div id="windows-list"></div>
  </div>

  <!-- RIGHT TOOLBAR -->
  <div id="right-toolbar">
    <div class="hud-pill" id="fps-pill">-- fps</div>
    <div class="hud-pill" id="status-pill">…</div>

    <div class="rt-spacer"></div>

    <button class="rt-btn" id="prev-btn" title="Previous window">&#9650;</button>
    <button class="rt-btn" id="next-btn" title="Next window">&#9660;</button>

    <div class="rt-spacer"></div>

    <button class="rt-btn" id="keyboard-btn" title="Keyboard">&#9000;</button>
  </div>

  <!-- hidden keyboard input -->
  <input id="keyboard-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off">

  <!-- Unavailable overlay -->
  <div id="unavailable-overlay">
    <p>Window unavailable</p>
    <button id="reconnect-btn">Reconnect</button>
  </div>

  <script src="/static/windows_panel.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
