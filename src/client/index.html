<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/static/manifest.json">
  <title>WindowControl</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- SCREEN 1: Window list -->
  <div id="screen-list" class="screen active">
    <div id="list-header">
      <span id="list-title">Windows</span>
      <button id="list-refresh-btn" title="Refresh">&#8635;</button>
    </div>
    <div id="windows-grid"></div>
  </div>

  <!-- SCREEN 2: Stream -->
  <div id="screen-stream" class="screen">

    <!-- Stream: WebRTC video (primary) + MJPEG img (fallback) -->
    <div id="stream-container">
      <video id="stream-video" autoplay playsinline muted style="display:none"></video>
      <img id="stream-img" alt="stream" draggable="false">
    </div>

    <!-- Right toolbar -->
    <div id="right-toolbar">
      <div class="hud-pill" id="fps-pill">-- fps</div>
      <div class="hud-pill" id="status-pill">…</div>
      <div class="rt-spacer"></div>
      <button class="rt-btn" id="prev-btn" title="Previous window">&#9650;</button>
      <button class="rt-btn" id="next-btn" title="Next window">&#9660;</button>
      <div class="rt-spacer"></div>
      <button class="rt-btn" id="keyboard-btn" title="Keyboard">&#9000;</button>
      <button class="rt-btn" id="fullscreen-btn" title="Fullscreen">&#x26F6;</button>
      <div class="rt-spacer"></div>
      <button class="rt-btn" id="back-btn" title="Back to windows">&#8617;</button>
    </div>

    <!-- hidden keyboard input -->
    <input id="keyboard-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off">

    <!-- Unavailable overlay -->
    <div id="unavailable-overlay">
      <p>Window unavailable</p>
      <button id="reconnect-btn">Reconnect</button>
    </div>

  </div>

  <script src="/static/windows_panel.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
