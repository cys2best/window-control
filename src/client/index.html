<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/static/manifest.json">
  <title>WindowControl</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- CENTER: stream -->
  <div id="stream-container">
    <img id="stream-img" alt="stream" draggable="false">
  </div>

  <!-- LEFT PANEL: toggle button + window list -->
  <div id="left-toggle" title="Windows">&#9654;</div>

  <div id="left-panel">
    <div id="left-header">
      <span>Windows</span>
      <button id="left-close">&#10005;</button>
    </div>
    <div id="windows-list"></div>
  </div>

  <!-- RIGHT TOOLBAR -->
  <div id="right-toolbar">
    <div class="hud-pill" id="fps-pill">-- fps</div>
    <div class="hud-pill" id="status-pill">…</div>

    <div class="rt-spacer"></div>

    <button class="rt-btn" id="prev-btn" title="Previous window">&#9650;</button>
    <button class="rt-btn" id="next-btn" title="Next window">&#9660;</button>

    <div class="rt-spacer"></div>

    <button class="rt-btn" id="keyboard-btn" title="Keyboard">&#9000;</button>
  </div>

  <!-- hidden keyboard input -->
  <input id="keyboard-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off">

  <!-- Unavailable overlay -->
  <div id="unavailable-overlay">
    <p>Window unavailable</p>
    <button id="reconnect-btn">Reconnect</button>
  </div>

  <script src="/static/windows_panel.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
